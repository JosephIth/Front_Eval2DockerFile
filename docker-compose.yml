version: '3.8'

#DOCKERHUB_NAME
#DOCKERHUB_TOKEN
#EC2_HOST
#EC2_SSH_KEY
#EC2_USER

services:
  frontend:
    build: .
    image: ${DOCKERHUB_NAME}/frontend:latest
    container_name: frontend
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: always
    environment:
      - PORT=5000
      - DEBUG=False
  